apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pushgateway
  template:
    metadata:
      labels:
        app: pushgateway
    spec:
      containers:
      - name: pushgateway
        image: prom/pushgateway:v1.6.0
        ports:
        - containerPort: 9091
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  namespace: application
spec:
  selector:
    app: pushgateway
  ports:
    - protocol: TCP
      port: 9091
      targetPort: 9091
