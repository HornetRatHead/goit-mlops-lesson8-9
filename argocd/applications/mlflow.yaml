apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.11.3
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: MLFLOW_PORT
          value: "5000"
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "http://minio:9000"
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minioadmin"
        - name: MLFLOW_BACKEND_STORE_URI
          value: "postgresql://mlflow:mlflow@postgres:5432/mlflow"
        command: ["/bin/sh"]
        args:
        - "-c"
        - "pip install psycopg2-binary && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri $(MLFLOW_BACKEND_STORE_URI) --default-artifact-root s3://mlflow/ --artifacts-destination s3://mlflow/"
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: application
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: mlflow
